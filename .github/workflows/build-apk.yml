name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Dependencies
      run: npm install

    - name: Build Shared Packages
      run: |
        npm run build --workspace=packages/types
        npm run build --workspace=packages/utils
        npm run build --workspace=packages/ui

    - name: Build Web Client (Static Assets)
      run: npm run build --workspace=apps/web

    - name: Sync Capacitor Android Config
      env:
        CAPACITOR_SERVER_URL: https://v19plus-web.vercel.app
      run: |
        cd apps/web
        npx cap sync android

    - name: Build Android App Bundle and APK
      run: |
        cd apps/web/android
        chmod +x gradlew
        ./gradlew assembleDebug bundleRelease

    - name: Sign App Bundle
      uses: r0adkll/sign-android-release@v1
      id: sign_app
      with:
        releaseDirectory: apps/web/android/app/build/outputs/bundle/release
        signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
        alias: ${{ secrets.KEYSTORE_ALIAS }}
        keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
        keyPassword: ${{ secrets.KEYSTORE_PASSWORD }}

    - name: Upload Compiled APK
      uses: actions/upload-artifact@v4
      with:
        name: v19plus-apk
        path: apps/web/android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7

    - name: Upload Compiled AAB
      uses: actions/upload-artifact@v4
      with:
        name: v19plus-aab
        path: ${{steps.sign_app.outputs.signedReleaseFile}}
        retention-days: 7
